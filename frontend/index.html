<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hivemind Drone Swarm</title>
    <script>window.CESIUM_BASE_URL = 'https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium';</script>
    <script src="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Cesium.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.119/Build/Cesium/Widgets/widgets.css">
    <style>
        html, body, #cesiumContainer { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
        #hud {
            position: absolute; top: 12px; left: 12px; z-index: 100;
            background: rgba(0,0,0,0.75); color: #fff; padding: 10px 14px;
            font-family: monospace; font-size: 13px; border-radius: 6px; line-height: 1.5;
            min-width: 200px; pointer-events: none;
        }
        #hud .title { font-weight: bold; color: #ffd700; font-size: 15px; margin-bottom: 4px; }
        #hud .stat { display: flex; justify-content: space-between; gap: 20px; }
        #legend {
            position: absolute; bottom: 30px; right: 20px; z-index: 100;
            background: rgba(0,0,0,0.7); color: #ccc; padding: 8px 12px;
            font-family: monospace; font-size: 11px; border-radius: 6px; line-height: 1.8;
            pointer-events: none;
        }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .swatch { width: 14px; height: 14px; border-radius: 3px; display: inline-block; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    <div id="hud">
        <div class="title">Hivemind Drone Swarm</div>
        <div class="stat"><span>Coverage:</span><span id="coveragePct">0%</span></div>
        <div class="stat"><span>Mapped:</span><span id="mappedCount">0/100</span></div>
        <div class="stat"><span>Observations:</span><span id="obsCount">0</span></div>
    </div>
    <div id="legend">
        <div class="legend-item"><span class="swatch" style="background:#555"></span> unexplored</div>
        <div class="legend-item"><span class="swatch" style="background:#FFD700"></span> in progress</div>
        <div class="legend-item"><span class="swatch" style="background:#4CAF50"></span> mapped</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
